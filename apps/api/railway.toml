[build]
builder = "DOCKERFILE"
dockerfilePath = "../../Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# ─── Cron ────────────────────────────────────────────────────────────────────
# Runs the onboarding drip + annual conversion email processor every 4 hours.
# Set CRON_SECRET env var in Railway dashboard (same value as API).
# Railway cron jobs require a separate service in the Railway dashboard:
#   - Command: curl -X POST -H "Authorization: Bearer $CRON_SECRET" $API_URL/api/drip/process
#   - Schedule: 0 */4 * * *  (every 4 hours)
# Alternatively, configure via Railway's built-in cron scheduler in the UI.
