version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: innermind-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: innermind
      POSTGRES_PASSWORD: innermind_dev
      POSTGRES_DB: innermind_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U innermind -d innermind_dev']
      interval: 5s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:16-alpine
    container_name: innermind-postgres-test
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: innermind
      POSTGRES_PASSWORD: innermind_dev
      POSTGRES_DB: innermind_test
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  postgres_test_data:
